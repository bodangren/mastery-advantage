  <text class="f" x="552" y="280" font-size="10.5" fill="rgba(255,255,255,.75)">ข้ออ้างนั้น?</text>
</g>

<!-- Message 4: mastery confirmed -->
<g class="msg4">
  <rect x="538" y="294" width="220" height="54" rx="10" fill="rgba(52,211,153,.18)" stroke="#34d399" stroke-width="1.2"/>
  <text class="f" x="552" y="312" font-size="9.5" font-weight="700" fill="#34d399">ติวเตอร์ AI</text>
