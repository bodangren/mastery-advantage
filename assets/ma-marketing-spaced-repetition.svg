<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500"
     role="img" aria-label="Mastery Advantage: Review at the perfect moment — spaced repetition that prevents forgetting">
<title>Review at the perfect moment · Mastery Advantage</title>
<style>
  .f { font-family: ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif; }

  /* ── 10 s master loop ── */

  /* Mastered state: 0–20% visible, 20–72% hidden, 72–100% visible */
  .st-mastered { animation: st-mastered 10s ease-in-out infinite; }
  @keyframes st-mastered {
    0%,18%  { opacity:1; }
    27%,70% { opacity:0; }
    77%,100%{ opacity:1; }
  }

  /* Forgetting state: 20–58% */
  .st-forgetting { animation: st-forgetting 10s ease-in-out infinite; }
  @keyframes st-forgetting {
    0%,22%  { opacity:0; }
    30%,55% { opacity:1; }
    64%     { opacity:0; }
    100%    { opacity:0; }
  }

  /* Reviewed flash: 58–76% */
  .st-reviewed { animation: st-reviewed 10s ease-in-out infinite; }
  @keyframes st-reviewed {
    0%,60%  { opacity:0; }
    66%,73% { opacity:1; }
    79%     { opacity:0; }
    100%    { opacity:0; }
  }

  /* Memory bar — blue fill, scaleX from 1→tiny→1 */
  .bar-blue {
    fill: #38bdf8;
    transform-origin: 0% 50%;
    transform-box: fill-box;
    animation: bar-blue 10s ease-in-out infinite;
  }
  @keyframes bar-blue {
    0%,18%  { transform:scaleX(1);    opacity:1; }
    50%     { transform:scaleX(0.06); opacity:0.6; }
    60%     { transform:scaleX(0.06); opacity:0; }
    65%     { transform:scaleX(1);    opacity:0; }
    68%     { transform:scaleX(1);    opacity:1; }
    77%,100%{ transform:scaleX(1);    opacity:1; }
  }

  /* Memory bar — amber decay overlay */
  .bar-amber {
    fill: #d97706;
    transform-origin: 0% 50%;
    transform-box: fill-box;
    animation: bar-amber 10s ease-in-out infinite;
  }
  @keyframes bar-amber {
    0%,20%  { transform:scaleX(1);    opacity:0; }
    30%     { transform:scaleX(1);    opacity:0.75; }
    54%     { transform:scaleX(0.06); opacity:0.75; }
    62%     { transform:scaleX(0.06); opacity:0; }
    100%    { opacity:0; }
  }

  /* White flash bar at review moment */
  .bar-white {
    fill: #ffffff;
    transform-origin: 0% 50%;
    transform-box: fill-box;
    animation: bar-white 10s ease-in-out infinite;
  }
  @keyframes bar-white {
    0%,63%  { transform:scaleX(0); opacity:0; }
    66%     { transform:scaleX(1); opacity:0.9; }
    72%     { transform:scaleX(1); opacity:0; }
    100%    { opacity:0; }
  }

  /* Ring: gentle pulse (mastered) */
  .ring-pulse {
    animation: ring-pulse 2.2s ease-in-out infinite;
    transform-origin: center;
    transform-box: fill-box;
  }
  @keyframes ring-pulse {
    0%,100% { transform:scale(1);    opacity:0.45; }
    50%     { transform:scale(1.08); opacity:0.9; }
  }

  /* Ring: flicker (forgetting) */
  .ring-flicker {
    animation: ring-flicker 0.75s ease-in-out infinite;
    transform-origin: center;
    transform-box: fill-box;
  }
  @keyframes ring-flicker {
    0%,100% { transform:scale(1);    opacity:0.25; }
    50%     { transform:scale(1.14); opacity:1; }
  }

  /* Ring: burst pop (reviewed) */
  .ring-pop {
    animation: ring-pop 1.4s ease-out infinite;
    transform-origin: center;
    transform-box: fill-box;
  }
  @keyframes ring-pop {
    0%    { transform:scale(1);   opacity:0.95; stroke-width:3; }
    100%  { transform:scale(2.6); opacity:0;    stroke-width:0.5; }
  }

  /* Phase labels */
  .ph-mastered   { animation: ph-mastered   10s ease-in-out infinite; }
  .ph-forgetting { animation: ph-forgetting 10s ease-in-out infinite; }
  .ph-reviewing  { animation: ph-reviewing  10s ease-in-out infinite; }
  .ph-secured    { animation: ph-secured    10s ease-in-out infinite; }
  @keyframes ph-mastered   { 0%,14%{opacity:1} 24%,100%{opacity:0} }
  @keyframes ph-forgetting { 0%,26%{opacity:0} 35%,53%{opacity:1} 62%,100%{opacity:0} }
  @keyframes ph-reviewing  { 0%,62%{opacity:0} 67%,73%{opacity:1} 80%,100%{opacity:0} }
  @keyframes ph-secured    { 0%,78%{opacity:0} 84%,96%{opacity:1} 100%{opacity:0} }

  /* Badge pop on review trigger */
  .badge {
    animation: badge 10s ease-in-out infinite;
    transform-origin: center;
    transform-box: fill-box;
  }
  @keyframes badge {
    0%,57%  { opacity:0; transform:scale(0); }
    63%     { opacity:1; transform:scale(1.25); }
    70%,78% { opacity:1; transform:scale(1); }
    84%     { opacity:0; transform:scale(0); }
    100%    { opacity:0; }
  }

  /* SRS interval marker slides right on review */
  .interval-marker {
    animation: interval-marker 10s ease-in-out infinite;
  }
  @keyframes interval-marker {
    0%,62%  { transform:translateX(90px);  opacity:0.55; }
    68%,69% { opacity:0; }
    70%     { transform:translateX(210px); opacity:0; }
    76%,96% { transform:translateX(210px); opacity:0.9; }
    100%    { transform:translateX(210px); opacity:0; }
  }

  @media (prefers-reduced-motion: reduce) { * { animation: none !important; } }

  /* Forgetting curve decorative arc */
  .decay-curve {
    animation: decay-curve 10s ease-in-out infinite;
    stroke-dasharray: 280;
  }
  @keyframes decay-curve {
    0%,18%  { stroke-dashoffset:0;   opacity:0.12; }
    55%     { stroke-dashoffset:230; opacity:0.25; }
    66%     { stroke-dashoffset:0;   opacity:0; }
    77%,100%{ stroke-dashoffset:0;   opacity:0.12; }
  }
</style>

<defs>
  <radialGradient id="bg1" cx="42%" cy="35%" r="72%">
    <stop offset="0%"   stop-color="#131c30"/>
    <stop offset="100%" stop-color="#0a0f1e"/>
  </radialGradient>
  <pattern id="grid1" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M40 0L0 0 0 40" fill="none" stroke="rgba(255,255,255,.034)" stroke-width="1"/>
  </pattern>
  <filter id="gls1" x="-60%" y="-60%" width="220%" height="220%">
    <feGaussianBlur stdDeviation="5" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="glst1" x="-100%" y="-100%" width="300%" height="300%">
    <feGaussianBlur stdDeviation="14" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="glaw1" x="-100%" y="-100%" width="300%" height="300%">
    <feGaussianBlur stdDeviation="12" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <clipPath id="bar-clip1">
    <rect x="386" y="70" width="392" height="14" rx="7"/>
  </clipPath>
  <symbol id="chk1" viewBox="0 0 24 24">
    <path d="M5 12L9.5 17L19 7" fill="none" stroke="currentColor" stroke-width="2.8"
          stroke-linecap="round" stroke-linejoin="round"/>
  </symbol>
  <symbol id="spk1" viewBox="0 0 24 24">
    <path d="M12 3L14 9.5L21 12L14 14.5L12 21L10 14.5L3 12L10 9.5Z" fill="currentColor"/>
  </symbol>
</defs>

<!-- Background -->
<rect width="800" height="500" fill="url(#bg1)"/>
<rect width="800" height="500" fill="url(#grid1)"/>

<!-- ── LEFT PANEL ── -->
<text class="f" x="44" y="66"
      font-size="10.5" font-weight="700" letter-spacing="0.15em"
      fill="rgba(255,255,255,.38)">MASTERY ADVANTAGE · READING ADVANTAGE</text>

<text class="f" x="44" y="114"
      font-size="38" font-weight="800" letter-spacing="-0.03em"
      fill="#e8e4d8">Review at the</text>
<text class="f" x="44" y="159"
      font-size="38" font-weight="800" letter-spacing="-0.03em" font-style="italic"
      fill="#38bdf8">perfect moment.</text>

<rect x="44" y="174" width="188" height="3" rx="1.5" fill="#38bdf8" opacity=".65"/>

<text class="f" x="44" y="212" font-size="14" fill="rgba(255,255,255,.54)">Every skill has a forgetting curve. Mastery</text>
<text class="f" x="44" y="232" font-size="14" fill="rgba(255,255,255,.54)">Advantage tracks memory strength in real</text>
<text class="f" x="44" y="252" font-size="14" fill="rgba(255,255,255,.54)">time — surfacing reviews before forgetting</text>
<text class="f" x="44" y="272" font-size="14" fill="rgba(255,255,255,.54)">begins, then extending intervals as mastery</text>
<text class="f" x="44" y="292" font-size="14" fill="rgba(255,255,255,.54)">deepens. The result: nothing slips away.</text>

<!-- Legend -->
<g transform="translate(44,330)">
  <circle cx="7" cy="7" r="6" fill="#38bdf8"/>
  <text class="f" x="20" y="12" font-size="13" fill="rgba(255,255,255,.65)">Mastered</text>
  <circle cx="7" cy="31" r="6" fill="#b45309"/>
  <text class="f" x="20" y="36" font-size="13" fill="rgba(255,255,255,.65)">About to forget</text>
  <circle cx="7" cy="55" r="6" fill="#ffffff"/>
  <text class="f" x="20" y="60" font-size="13" fill="rgba(255,255,255,.65)">Just reviewed</text>
</g>

<text class="f" x="44" y="454"
      font-size="11.5" font-weight="600" letter-spacing="0.04em"
      fill="rgba(255,255,255,.22)">Spaced repetition · built into every session</text>

<!-- Divider -->
<line x1="356" y1="28" x2="356" y2="472" stroke="rgba(255,255,255,.05)" stroke-width="1"/>

<!-- ── RIGHT PANEL ── -->

<!-- "Memory Strength" header -->
<text class="f" x="582" y="56"
      text-anchor="middle" font-size="10.5" font-weight="700" letter-spacing="0.13em"
      fill="rgba(255,255,255,.35)">MEMORY STRENGTH</text>

<!-- Bar track -->
<rect x="386" y="70" width="392" height="14" rx="7" fill="rgba(255,255,255,.06)"/>

<!-- Bar fills (clipped to track) -->
<g clip-path="url(#bar-clip1)">
  <rect class="bar-amber" x="386" y="70" width="392" height="14"/>
  <rect class="bar-blue"  x="386" y="70" width="392" height="14" filter="url(#gls1)"/>
  <rect class="bar-white" x="386" y="70" width="392" height="14"/>
</g>

<!-- Percentage labels at bar ends -->
<text class="f" x="786" y="82"
      text-anchor="end" font-size="10" font-weight="700"
      fill="rgba(255,255,255,.3)">100%</text>

<!-- Decorative forgetting-curve arc in background -->
<path class="decay-curve"
      d="M392 104 Q490 130 582 200 Q640 256 700 300"
      fill="none" stroke="#d97706" stroke-width="1.5"
      stroke-dashoffset="0" stroke-linecap="round"/>

<!-- Node center: (582, 268) -->

<!-- Mastered (blue) state -->
<g class="st-mastered" transform="translate(582,268)">
  <circle r="58" fill="#1e4e6a" filter="url(#glst1)"/>
  <circle r="58" fill="#38bdf8"/>
  <circle r="75" fill="none" stroke="#7dd3fc" stroke-width="2" class="ring-pulse"/>
  <use href="#chk1" x="-15" y="-15" width="30" height="30" fill="#0a2040"/>
</g>

<!-- Forgetting (amber) state -->
<g class="st-forgetting" transform="translate(582,268)">
  <circle r="58" fill="#7c2d12" filter="url(#glaw1)"/>
  <circle r="58" fill="#92400e"/>
  <circle r="75" fill="none" stroke="#d97706" stroke-width="2" class="ring-flicker"/>
  <use href="#spk1" x="-15" y="-15" width="30" height="30" fill="#fde68a"/>
</g>

<!-- Reviewed (white flash) state -->
<g class="st-reviewed" transform="translate(582,268)">
  <circle r="58" fill="#e0f2fe" filter="url(#glst1)"/>
  <circle r="58" fill="#ffffff"/>
  <circle r="75" fill="none" stroke="#ffffff" stroke-width="3" class="ring-pop"/>
</g>

<!-- Phase label pill -->
<g transform="translate(582,352)">
  <rect x="-88" y="-14" width="176" height="26" rx="13" fill="rgba(255,255,255,.05)"/>
  <text class="f ph-mastered"
        text-anchor="middle" y="6" font-size="13" font-weight="700" letter-spacing="0.04em"
        fill="#7dd3fc">Mastered ✓</text>
  <text class="f ph-forgetting"
        text-anchor="middle" y="6" font-size="13" font-weight="700" letter-spacing="0.04em"
        fill="#d97706">About to forget…</text>
  <text class="f ph-reviewing"
        text-anchor="middle" y="6" font-size="13" font-weight="700" letter-spacing="0.04em"
        fill="#ffffff">Reviewing…</text>
  <text class="f ph-secured"
        text-anchor="middle" y="6" font-size="13" font-weight="700" letter-spacing="0.04em"
        fill="#34d399">Memory secured ✓</text>
</g>

<!-- Notification badge -->
<g class="badge" transform="translate(626,218)">
  <circle r="17" fill="#0b1220" stroke="#38bdf8" stroke-width="2"/>
  <circle r="14" fill="#38bdf8"/>
  <text class="f" text-anchor="middle" y="5" font-size="15" font-weight="800" fill="#0a2040">!</text>
</g>

<!-- SRS timeline strip -->
<g transform="translate(386,418)">
  <rect x="0" y="0" width="392" height="8" rx="4" fill="rgba(255,255,255,.05)"/>
  <text class="f" x="2" y="-8" font-size="10" fill="rgba(255,255,255,.28)">Now</text>
  <text class="f" x="390" y="-8" text-anchor="end" font-size="10" fill="rgba(255,255,255,.22)">Time →</text>

  <!-- Now marker -->
  <line x1="2" y1="-4" x2="2" y2="12" stroke="rgba(255,255,255,.35)" stroke-width="1.5"/>

  <!-- Next-review marker (jumps further right after each session) -->
  <g class="interval-marker">
    <line x1="0" y1="-5" x2="0" y2="13" stroke="#38bdf8" stroke-width="1.5" stroke-dasharray="2 2"/>
    <polygon points="0,17 -4,11 4,11" fill="#38bdf8"/>
    <text class="f" x="0" y="-11" text-anchor="middle" font-size="9.5" font-weight="700"
          fill="#38bdf8">Next review</text>
  </g>
</g>

<text class="f" x="582" y="458"
      text-anchor="middle" font-size="11" fill="rgba(255,255,255,.24)" letter-spacing="0.03em">
  The interval grows with each successful review
</text>

</svg>
