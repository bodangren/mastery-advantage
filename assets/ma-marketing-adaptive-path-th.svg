  <circle r="13" fill="none" stroke="#f5b942" stroke-width="3" class="unlock-ripple-7"/>
  <use href="#lck2" x="-7" y="-7" width="14" height="14" fill="rgba(255,255,255,.3)"/>
</g>

<!-- Deep locked nodes (never unlock in this loop) -->
<g transform="translate(756,262)">
  <circle r="11" fill="#1e2840"/>
  <circle r="14" fill="none" stroke="#2a3552" stroke-width="1.2"/>
  <use href="#lck2" x="-6" y="-6" width="12" height="12" fill="rgba(255,255,255,.18)"/>
</g>

<!-- ── Caption strip at bottom ── -->
<g transform="translate(390,432)">
  <rect x="0" y="0" width="388" height="36" rx="8" fill="rgba(255,255,255,.04)"/>

  <text class="f cap-A" x="194" y="23" text-anchor="middle"
