  </text>
  <text class="f cap-C" x="194" y="23" text-anchor="middle"
        font-size="13" font-weight="700" fill="#f5b942" letter-spacing="0.02em">
    ปลดล็อก 2 ทักษะใหม่ — พร้อมให้คุณเรียน
  </text>
  <text class="f cap-D" x="194" y="23" text-anchor="middle"
        font-size="13" font-weight="700" fill="#bae6fd" letter-spacing="0.02em">
    ขั้นตอนถัดไปที่แม่นยำของคุณ เสมอ
  </text>
</g>

</svg>
