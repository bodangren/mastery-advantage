<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500"
     role="img" aria-label="Mastery Advantage: รู้เสมอว่าต้องเรียนอะไรต่อ — เส้นทางการเรียนรู้แบบปรับตัวด้วย AI">
<title>รู้เสมอว่าต้องเรียนอะไรต่อ · Mastery Advantage</title>
<style>
  .f { font-family: ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif; }

  /* ── 9 s master loop ── */
  /* Phase A  0–22%:  Current node pulses at its position (n_current) */
  /* Phase B  22–38%: n_current → mastered; n_next → current          */
  /* Phase C  38–60%: Two locked nodes unlock (cascade ripple)         */
  /* Phase D  60–85%: New current node pulses, path extended           */
  /* Phase E  85–100%: Fade reset                                      */

  /* Active path — dashed flow */
  .active-path {
    stroke-dasharray: 9 6;
    animation: path-flow 1.8s linear infinite;
  }
  @keyframes path-flow { to { stroke-dashoffset: -60; } }

  /* Extended path fades in during Phase D */
  .active-path-ext {
    stroke-dasharray: 9 6;
    animation: path-flow 1.8s linear infinite, path-ext-vis 9s ease-in-out infinite;
  }
  @keyframes path-ext-vis {
    0%,38%  { opacity:0; stroke-dashoffset:0; }
    50%,83% { opacity:1; }
    92%     { opacity:0; }
    100%    { opacity:0; }
  }

  /* Node — current (white pulsing ring) visible phase A and D */
  .ring-current-A {
    animation: ring-cur-A 9s ease-in-out infinite;
    transform-origin: center; transform-box: fill-box;
  }
  @keyframes ring-cur-A {
    0%,18%  { transform:scale(1);    opacity:0.7; }
    25%     { transform:scale(1.12); opacity:0.9; }
    30%     { transform:scale(1);    opacity:0;   }
    100%    { opacity:0; }
  }

  .ring-current-D {
    animation: ring-cur-D 9s ease-in-out infinite;
    transform-origin: center; transform-box: fill-box;
  }
  @keyframes ring-cur-D {
    0%,55%  { opacity:0; }
    62%,82% { opacity:0.85; }
    90%     { opacity:0; }
    100%    { opacity:0; }
  }

  /* n_current: white → blue transition at Phase B */
  .n-current-fill {
    animation: n-current-fill 9s ease-in-out infinite;
  }
  @keyframes n-current-fill {
    0%,20%  { fill:#ffffff; }
    30%,100%{ fill:#38bdf8; }
  }

  /* n_current ring: white → blue */
  .n-current-ring {
    animation: n-current-ring 9s ease-in-out infinite;
  }
  @keyframes n-current-ring {
    0%,20%  { stroke:#bae6fd; stroke-width:3; }
    30%,100%{ stroke:#7dd3fc; stroke-width:2; }
  }

  /* n_next (was ready): amber → white at Phase B, stays white in D */
  .n-next-fill {
    animation: n-next-fill 9s ease-in-out infinite;
  }
  @keyframes n-next-fill {
    0%,22%  { fill:#f5b942; }
    32%,85% { fill:#ffffff; }
    92%     { fill:#f5b942; }
    100%    { fill:#f5b942; }
  }
  .n-next-ring {
    animation: n-next-ring 9s ease-in-out infinite;
  }
  @keyframes n-next-ring {
    0%,22%  { stroke:#ffd27a; stroke-width:2; }
    32%,85% { stroke:#bae6fd; stroke-width:3; }
    92%     { stroke:#ffd27a; stroke-width:2; }
    100%    { stroke:#ffd27a; stroke-width:2; }
  }

  /* n-next glow changes */
  .n-next-glow {
    animation: n-next-glow 9s ease-in-out infinite;
  }
  @keyframes n-next-glow {
    0%,22%  { fill:#f5b942; opacity:0.25; }
    32%,85% { fill:#ffffff; opacity:0.55; }
    92%     { fill:#f5b942; opacity:0.25; }
    100%    { fill:#f5b942; opacity:0.25; }
  }

  /* Locked nodes n6, n7 unlock (Phase C) */
  .n-locked-6 {
    animation: n-locked-6 9s ease-in-out infinite;
  }
  @keyframes n-locked-6 {
    0%,38%  { fill:#2a3552; }
    46%,100%{ fill:#f5b942; }
  }
  .ring-locked-6 {
    animation: ring-locked-6 9s ease-in-out infinite;
  }
  @keyframes ring-locked-6 {
    0%,38%  { stroke:#3a4870; stroke-width:1.5; }
    46%,100%{ stroke:#ffd27a; stroke-width:2; }
  }

  .n-locked-7 {
    animation: n-locked-7 9s ease-in-out infinite;
  }
  @keyframes n-locked-7 {
    0%,43%  { fill:#2a3552; }
    52%,100%{ fill:#f5b942; }
  }
  .ring-locked-7 {
    animation: ring-locked-7 9s ease-in-out infinite;
  }
  @keyframes ring-locked-7 {
    0%,43%  { stroke:#3a4870; stroke-width:1.5; }
    52%,100%{ stroke:#ffd27a; stroke-width:2; }
  }

  /* Unlock ripple burst for n6 */
  .unlock-ripple-6 {
    animation: unlock-ripple-6 9s ease-out infinite;
    transform-origin: center; transform-box: fill-box;
  }
  @keyframes unlock-ripple-6 {
    0%,38%  { transform:scale(0); opacity:0; }
    42%     { transform:scale(1); opacity:0.9; }
    55%     { transform:scale(2.8); opacity:0; }
    100%    { transform:scale(0); opacity:0; }
  }

  /* Unlock ripple for n7 */
  .unlock-ripple-7 {
    animation: unlock-ripple-7 9s ease-out infinite;
    transform-origin: center; transform-box: fill-box;
  }
  @keyframes unlock-ripple-7 {
    0%,44%  { transform:scale(0); opacity:0; }
    49%     { transform:scale(1); opacity:0.9; }
    62%     { transform:scale(2.8); opacity:0; }
    100%    { transform:scale(0); opacity:0; }
  }

  @media (prefers-reduced-motion: reduce) { * { animation: none !important; } }

  /* Caption labels */
  .cap-A  { animation: cap-A  9s ease-in-out infinite; }
  .cap-B  { animation: cap-B  9s ease-in-out infinite; }
  .cap-C  { animation: cap-C  9s ease-in-out infinite; }
  .cap-D  { animation: cap-D  9s ease-in-out infinite; }
  @keyframes cap-A { 0%,16%{opacity:1} 24%,100%{opacity:0} }
  @keyframes cap-B { 0%,22%{opacity:0} 30%,36%{opacity:1} 44%,100%{opacity:0} }
  @keyframes cap-C { 0%,38%{opacity:0} 46%,58%{opacity:1} 66%,100%{opacity:0} }
  @keyframes cap-D { 0%,62%{opacity:0} 70%,84%{opacity:1} 92%,100%{opacity:0} }

  /* "You are here" label moves from n_current to n_next */
  .label-here-A {
    animation: label-A 9s ease-in-out infinite;
  }
  .label-here-D {
    animation: label-D 9s ease-in-out infinite;
  }
  @keyframes label-A { 0%,20%{opacity:1} 30%,100%{opacity:0} }
  @keyframes label-D { 0%,58%{opacity:0} 66%,84%{opacity:1} 92%,100%{opacity:0} }
</style>

<defs>
  <radialGradient id="bg2" cx="40%" cy="35%" r="70%">
    <stop offset="0%"   stop-color="#131c30"/>
    <stop offset="100%" stop-color="#0a0f1e"/>
  </radialGradient>
  <pattern id="grid2" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M40 0L0 0 0 40" fill="none" stroke="rgba(255,255,255,.034)" stroke-width="1"/>
  </pattern>
  <filter id="gls2" x="-60%" y="-60%" width="220%" height="220%">
    <feGaussianBlur stdDeviation="5" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="glst2" x="-100%" y="-100%" width="300%" height="300%">
    <feGaussianBlur stdDeviation="12" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <linearGradient id="path-grad2" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%"   stop-color="#38bdf8"/>
    <stop offset="100%" stop-color="#bae6fd"/>
  </linearGradient>
  <symbol id="chk2" viewBox="0 0 24 24">
    <path d="M5 12L9.5 17L19 7" fill="none" stroke="currentColor" stroke-width="2.8"
          stroke-linecap="round" stroke-linejoin="round"/>
  </symbol>
  <symbol id="spk2" viewBox="0 0 24 24">
    <path d="M12 3L14 9.5L21 12L14 14.5L12 21L10 14.5L3 12L10 9.5Z" fill="currentColor"/>
  </symbol>
  <symbol id="lck2" viewBox="0 0 24 24">
    <rect x="6" y="11" width="12" height="9" rx="2" fill="currentColor"/>
    <path d="M8.5 11V8.5a3.5 3.5 0 0 1 7 0V11" fill="none" stroke="currentColor" stroke-width="1.6"/>
  </symbol>
</defs>

<!-- Background -->
<rect width="800" height="500" fill="url(#bg2)"/>
<rect width="800" height="500" fill="url(#grid2)"/>

<!-- ── LEFT PANEL ── -->
<text class="f" x="44" y="66"
      font-size="10.5" font-weight="700" letter-spacing="0.15em"
      fill="rgba(255,255,255,.38)">MASTERY ADVANTAGE · การเรียนรู้แบบปรับตัว</text>

<text class="f" x="44" y="114"
      font-size="38" font-weight="800" letter-spacing="-0.03em" fill="#e8e4d8">รู้เสมอ</text>
<text class="f" x="44" y="159"
      font-size="38" font-weight="800" letter-spacing="-0.03em" font-style="italic"
      fill="#38bdf8">ว่าต้องเรียนอะไรต่อ</text>

<rect x="44" y="174" width="152" height="3" rx="1.5" fill="#38bdf8" opacity=".65"/>

<text class="f" x="44" y="212" font-size="14" fill="rgba(255,255,255,.54)">กราฟความรู้ของคุณจัดวางทุกทักษะ</text>
<text class="f" x="44" y="232" font-size="14" fill="rgba(255,255,255,.54)">และสิ่งที่ต้องเรียนก่อน เมื่อคุณชำนาญ</text>
<text class="f" x="44" y="252" font-size="14" fill="rgba(255,255,255,.54)">ทักษะหนึ่ง ทักษะถัดไปจะปลดล็อก</text>
<text class="f" x="44" y="272" font-size="14" fill="rgba(255,255,255,.54)">ปรับให้เหมาะกับสิ่งที่คุณพร้อมเรียนพอดี</text>
<text class="f" x="44" y="292" font-size="14" fill="rgba(255,255,255,.54)">ไม่ต้องเดา ไม่เสียเวลาเรียนเปล่า</text>

<!-- Legend -->
<g transform="translate(44,330)">
  <circle cx="7" cy="7" r="6" fill="#38bdf8"/>
  <text class="f" x="20" y="12" font-size="13" fill="rgba(255,255,255,.65)">ชำนาญแล้ว</text>
  <circle cx="7" cy="31" r="6" fill="#ffffff"/>
  <text class="f" x="20" y="36" font-size="13" fill="rgba(255,255,255,.65)">คุณอยู่ที่นี่</text>
  <circle cx="7" cy="55" r="6" fill="#f5b942"/>
  <text class="f" x="20" y="60" font-size="13" fill="rgba(255,255,255,.65)">พร้อมเรียน</text>
  <circle cx="7" cy="79" r="6" fill="#2a3552" stroke="#3a4870" stroke-width="1.5"/>
  <text class="f" x="20" y="84" font-size="13" fill="rgba(255,255,255,.65)">ยังไม่ได้ปลดล็อก</text>
</g>

<text class="f" x="44" y="454"
      font-size="11.5" font-weight="600" letter-spacing="0.04em"
      fill="rgba(255,255,255,.22)">กราฟความรู้ · วางแผนเส้นทางโดยคำนึงถึงสิ่งที่ต้องเรียนก่อน</text>

<!-- Divider -->
<line x1="356" y1="28" x2="356" y2="472" stroke="rgba(255,255,255,.05)" stroke-width="1"/>

<!-- ── RIGHT PANEL — Mini Knowledge Graph ── -->
<!-- Layout: A2 cluster (left) → B1 cluster (centre) → B2 cluster (right) -->
<!-- Cluster labels -->
<text class="f" x="430" y="80" text-anchor="middle" font-size="10" font-weight="700"
      letter-spacing="0.13em" fill="rgba(255,255,255,.28)">A2</text>
<text class="f" x="567" y="80" text-anchor="middle" font-size="10" font-weight="700"
      letter-spacing="0.13em" fill="rgba(255,255,255,.28)">B1</text>
<text class="f" x="690" y="80" text-anchor="middle" font-size="10" font-weight="700"
      letter-spacing="0.13em" fill="rgba(255,255,255,.28)">B2</text>

<!-- Cluster ellipses -->
<ellipse cx="430" cy="270" rx="80" ry="130"
