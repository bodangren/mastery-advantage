<ellipse cx="690" cy="290" rx="84" ry="130"
         fill="rgba(255,255,255,.02)" stroke="rgba(255,255,255,.07)"
         stroke-dasharray="3 5"/>

<!-- ── Edges ── -->
<!-- A2 mastered nodes → B1 current (n3) -->
<path d="M445 226 Q510 228 548 234" fill="none" stroke="rgba(255,255,255,.09)" stroke-width="1.2"/>
<path d="M446 294 Q512 272 548 248" fill="none" stroke="rgba(255,255,255,.09)" stroke-width="1.2"/>
<path d="M404 260 Q482 254 548 240" fill="none" stroke="rgba(255,255,255,.09)" stroke-width="1.2"/>
<!-- B1 internal -->
<path d="M568 196 Q574 216 572 234" fill="none" stroke="rgba(255,255,255,.09)" stroke-width="1.2"/>
<path d="M560 252 Q568 296 574 318" fill="none" stroke="rgba(255,255,255,.09)" stroke-width="1.2"/>
<!-- B1 → B2 n_next (n4) and n_next2 (n5) -->
<path d="M590 236 Q636 230 660 234" fill="none" stroke="rgba(255,255,255,.09)" stroke-width="1.2"/>
<path d="M586 248 Q636 274 660 290" fill="none" stroke="rgba(255,255,255,.09)" stroke-width="1.2"/>
<!-- B2 internal / deeper locked -->
<path d="M674 228 Q696 220 718 218" fill="none" stroke="rgba(255,255,255,.07)" stroke-width="1.2"/>
<path d="M674 298 Q696 314 718 316" fill="none" stroke="rgba(255,255,255,.07)" stroke-width="1.2"/>
<path d="M680 242 Q704 256 720 268" fill="none" stroke="rgba(255,255,255,.07)" stroke-width="1.2"/>

<!-- Active path A: A2 mastered → B1 current (n3) -->
<path class="active-path"
      d="M446 260 Q510 254 548 242"
      fill="none" stroke="url(#path-grad2)" stroke-width="2.8" stroke-linecap="round"/>

<!-- Active path extended (B1 → B2 n_next) -->
<path class="active-path-ext"
      d="M590 240 Q636 232 658 234"
      fill="none" stroke="url(#path-grad2)" stroke-width="2.8" stroke-linecap="round"/>

<!-- ── Nodes ── -->

<!-- A2 MASTERED nodes: n0(446,260), n1(430,195), n2(430,325) -->
<!-- n0 -->
<g transform="translate(430,260)">
  <circle r="18" fill="#38bdf8" filter="url(#gls2)"/>
  <circle r="18" fill="#38bdf8"/>
  <circle r="23" fill="none" stroke="#7dd3fc" stroke-width="1.5"/>
  <use href="#chk2" x="-9" y="-9" width="18" height="18" fill="#0a2040"/>
</g>
<!-- n1 -->
<g transform="translate(414,195)">
  <circle r="16" fill="#38bdf8"/>
  <circle r="20" fill="none" stroke="#7dd3fc" stroke-width="1.5"/>
  <use href="#chk2" x="-8" y="-8" width="16" height="16" fill="#0a2040"/>
</g>
<!-- n2 -->
<g transform="translate(446,325)">
  <circle r="15" fill="#38bdf8"/>
  <circle r="19" fill="none" stroke="#7dd3fc" stroke-width="1.5"/>
  <use href="#chk2" x="-8" y="-8" width="16" height="16" fill="#0a2040"/>
</g>

<!-- B1 CLUSTER: n3 = current (n_current), n_b1a, n_b1b -->
<!-- n_b1a: small locked node in B1 -->
<g transform="translate(566,196)">
  <circle r="13" fill="#2a3552"/>
  <circle r="17" fill="none" stroke="#3a4870" stroke-width="1.5"/>
  <use href="#lck2" x="-7" y="-7" width="14" height="14" fill="rgba(255,255,255,.3)"/>
</g>
<!-- n_b1b: small locked node in B1 -->
<g transform="translate(576,322)">
  <circle r="12" fill="#2a3552"/>
  <circle r="16" fill="none" stroke="#3a4870" stroke-width="1.5"/>
  <use href="#lck2" x="-6" y="-6" width="12" height="12" fill="rgba(255,255,255,.3)"/>
</g>

<!-- n3 = CURRENT NODE (B1 hub, transitions mastered→current) -->
<!-- Glow halo (always blue after Phase B) -->
<circle cx="566" cy="242" r="30" class="n-next-glow" filter="url(#glst2)" opacity="0.4"/>
<!-- Fill circle -->
<circle cx="566" cy="242" r="22" class="n-current-fill"/>
<!-- Ring -->
<circle cx="566" cy="242" r="29" fill="none" class="n-current-ring"/>
<!-- Pulsing ring (Phase A — when it's still the current node) -->
<circle cx="566" cy="242" r="34" fill="none" stroke="#bae6fd" stroke-width="2"
        class="ring-current-A"/>
<!-- Icon -->
<use href="#spk2" cx="566" cy="242" x="555" y="231" width="22" height="22" fill="#0b1220"/>

<!-- "You are here" label A (at n3) -->
<text class="f label-here-A" x="566" y="204" text-anchor="middle"
      font-size="11.5" font-weight="700" fill="rgba(255,255,255,.8)">คุณอยู่ที่นี่</text>

<!-- B2 CLUSTER -->
<!-- n4 = n_next (READY → becomes CURRENT in Phase D) -->
