<circle cx="662" cy="234" r="26" class="n-next-glow" filter="url(#glst2)" opacity="0.3"/>
<!-- n_next fill -->
<circle cx="662" cy="234" r="18" class="n-next-fill"/>
<!-- n_next ring -->
