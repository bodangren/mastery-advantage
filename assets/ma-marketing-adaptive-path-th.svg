<!-- n_next pulsing ring (Phase D — when n4 becomes current) -->
<circle cx="662" cy="234" r="30" fill="none" stroke="#bae6fd" stroke-width="2"
        class="ring-current-D"/>
<!-- Icon -->
<use href="#spk2" x="651" y="223" width="22" height="22" fill="#0b1220"/>

<!-- "You are here" label D (at n4) -->
<text class="f label-here-D" x="662" y="198" text-anchor="middle"
      font-size="11.5" font-weight="700" fill="rgba(255,255,255,.8)">คุณอยู่ที่นี่</text>

<!-- n5 = READY node in B2 -->
<g transform="translate(660,290)">
  <circle r="15" fill="#f5b942"/>
  <circle r="20" fill="none" stroke="#ffd27a" stroke-width="1.5"/>
  <use href="#spk2" x="-8" y="-8" width="16" height="16" fill="#1a1208"/>
</g>

<!-- n6 = LOCKED → UNLOCKS at Phase C (first unlock) -->
<g transform="translate(718,218)">
  <!-- Base circle (animates fill) -->
  <circle r="14" class="n-locked-6"/>
  <circle r="18" fill="none" class="ring-locked-6"/>
  <!-- Unlock ripple -->
  <circle r="14" fill="none" stroke="#f5b942" stroke-width="3" class="unlock-ripple-6"/>
  <!-- Icon (lock initially, spark after unlock) -->
