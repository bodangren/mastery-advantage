<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500"
     role="img" aria-label="Codecamp Advantage: From zero to full-stack. One skill at a time. Powered by Mastery Advantage.">
<title>From zero to full-stack. One skill at a time. · Codecamp Advantage</title>
<style>
  .f    { font-family: ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif; }
  .fmono{ font-family: 'Menlo', 'Monaco', 'Consolas', 'Courier New', monospace; }

  /* 14s loop */
  /* A 0-18%: terminal cursor blinks, HTML skill node lights */
  /* B 18-36%: CSS + JS nodes unlock */
  /* C 36-52%: DOM + Fetch nodes unlock */
  /* D 52-68%: React node unlocks, mentor review badge fires */
  /* E 68-82%: Node/API + DB unlock */
  /* F 82-96%: Deploy node ignites, week progress bar fills */
  /* G 96-100%: reset */

  /* Blinking cursor */
  .cursor { animation: cursor 0.7s step-end infinite, curvis 14s ease-in-out infinite; }
  @keyframes cursor { 0%,100%{opacity:1} 50%{opacity:0} }
  @keyframes curvis  { 0%,16%{opacity:1} 22%,100%{opacity:0} }

  /* Code lines type in */
  .line1 { animation: l1 14s ease-in-out infinite; }
  @keyframes l1 { 0%,4%{opacity:0;transform:translateX(-8px)} 10%,96%{opacity:1;transform:translateX(0)} 100%{opacity:0} }
  .line2 { animation: l2 14s ease-in-out infinite; }
  @keyframes l2 { 0%,8%{opacity:0;transform:translateX(-8px)} 14%,96%{opacity:1;transform:translateX(0)} 100%{opacity:0} }
  .line3 { animation: l3 14s ease-in-out infinite; }
  @keyframes l3 { 0%,12%{opacity:0;transform:translateX(-8px)} 18%,96%{opacity:1;transform:translateX(0)} 100%{opacity:0} }
  .line4 { animation: l4 14s ease-in-out infinite; }
  @keyframes l4 { 0%,28%{opacity:0;transform:translateX(-8px)} 34%,96%{opacity:1;transform:translateX(0)} 100%{opacity:0} }
  .line5 { animation: l5 14s ease-in-out infinite; }
  @keyframes l5 { 0%,50%{opacity:0;transform:translateX(-8px)} 56%,96%{opacity:1;transform:translateX(0)} 100%{opacity:0} }
  .line6 { animation: l6 14s ease-in-out infinite; }
  @keyframes l6 { 0%,66%{opacity:0;transform:translateX(-8px)} 72%,96%{opacity:1;transform:translateX(0)} 100%{opacity:0} }

  /* Skill nodes — light up in sequence */
  /* Colors: teal (#2dd4bf) for mastered, amber for ready, dark for locked */
  .sk-html { animation: sk1 14s ease-in-out infinite; }
  @keyframes sk1 { 0%,14%{fill:#1a2a2a} 20%,96%{fill:#2dd4bf} 100%{fill:#1a2a2a} }
  .sk-html-r { animation: sk1r 14s ease-in-out infinite; }
  @keyframes sk1r { 0%,14%{stroke:#2a3a3a} 20%,96%{stroke:#99f6e4} 100%{stroke:#2a3a3a} }
  .rip1 { animation: rip1 14s ease-out infinite; transform-origin:center; transform-box:fill-box; }
  @keyframes rip1 { 0%,14%{transform:scale(0);opacity:0} 18%{transform:scale(1);opacity:0.8} 28%{transform:scale(2.5);opacity:0} 100%{opacity:0} }

  .sk-css { animation: sk2 14s ease-in-out infinite; }
  @keyframes sk2 { 0%,20%{fill:#1a2a2a} 28%,96%{fill:#2dd4bf} 100%{fill:#1a2a2a} }
  .sk-css-r { animation: sk2r 14s ease-in-out infinite; }
  @keyframes sk2r { 0%,20%{stroke:#2a3a3a} 28%,96%{stroke:#99f6e4} 100%{stroke:#2a3a3a} }
  .rip2 { animation: rip2 14s ease-out infinite; transform-origin:center; transform-box:fill-box; }
  @keyframes rip2 { 0%,20%{transform:scale(0);opacity:0} 24%{transform:scale(1);opacity:0.8} 34%{transform:scale(2.5);opacity:0} 100%{opacity:0} }

  .sk-js { animation: sk3 14s ease-in-out infinite; }
  @keyframes sk3 { 0%,28%{fill:#1a2a2a} 36%,96%{fill:#2dd4bf} 100%{fill:#1a2a2a} }
  .sk-js-r { animation: sk3r 14s ease-in-out infinite; }
  @keyframes sk3r { 0%,28%{stroke:#2a3a3a} 36%,96%{stroke:#99f6e4} 100%{stroke:#2a3a3a} }
  .rip3 { animation: rip3 14s ease-out infinite; transform-origin:center; transform-box:fill-box; }
  @keyframes rip3 { 0%,28%{transform:scale(0);opacity:0} 32%{transform:scale(1);opacity:0.8} 42%{transform:scale(2.5);opacity:0} 100%{opacity:0} }

  .sk-dom { animation: sk4 14s ease-in-out infinite; }
  @keyframes sk4 { 0%,36%{fill:#1a2a2a} 44%,96%{fill:#2dd4bf} 100%{fill:#1a2a2a} }
  .sk-fetch { animation: sk5 14s ease-in-out infinite; }
  @keyframes sk5 { 0%,42%{fill:#1a2a2a} 50%,96%{fill:#2dd4bf} 100%{fill:#1a2a2a} }

  .sk-react { animation: sk6 14s ease-in-out infinite; }
  @keyframes sk6 { 0%,50%{fill:#1a2a2a} 58%,96%{fill:#2dd4bf} 100%{fill:#1a2a2a} }
  .rip6 { animation: rip6 14s ease-out infinite; transform-origin:center; transform-box:fill-box; }
  @keyframes rip6 { 0%,50%{transform:scale(0);opacity:0} 54%{transform:scale(1);opacity:0.8} 64%{transform:scale(2.5);opacity:0} 100%{opacity:0} }

  .sk-node { animation: sk7 14s ease-in-out infinite; }
  @keyframes sk7 { 0%,66%{fill:#1a2a2a} 74%,96%{fill:#2dd4bf} 100%{fill:#1a2a2a} }
  .sk-db   { animation: sk8 14s ease-in-out infinite; }
  @keyframes sk8 { 0%,70%{fill:#1a2a2a} 78%,96%{fill:#2dd4bf} 100%{fill:#1a2a2a} }

  .sk-deploy { animation: sk9 14s ease-in-out infinite; }
  @keyframes sk9 { 0%,80%{fill:#1a2a2a} 88%,96%{fill:#2dd4bf} 100%{fill:#1a2a2a} }
  .deploy-burst { animation: dburst 14s ease-out infinite; transform-origin:center; transform-box:fill-box; }
  @keyframes dburst { 0%,80%{transform:scale(0);opacity:0} 84%{transform:scale(1);opacity:0.9} 94%{transform:scale(2.8);opacity:0} 100%{opacity:0} }
  .rocket { animation: rocket 14s ease-in-out infinite; }
  @keyframes rocket { 0%,82%{transform:translate(0,0);opacity:0} 86%{transform:translate(0,0);opacity:1} 95%{transform:translate(8px,-18px);opacity:1} 100%{opacity:0} }

  /* Mentor review badge */
  .mentor-badge { animation: mentor 14s ease-in-out infinite; transform-origin:center; transform-box:fill-box; }
  @keyframes mentor { 0%,52%{opacity:0;transform:scale(0.7)} 60%,66%{opacity:1;transform:scale(1)} 74%,100%{opacity:0} }

  /* Week progress bar */
  .week-bar { animation: wbar 14s ease-in-out infinite; transform-origin:0% 50%; transform-box:fill-box; }
  @keyframes wbar { 0%,2%{transform:scaleX(0.07)} 86%,94%{transform:scaleX(0.2)} 100%{transform:scaleX(0.07) } }

  /* Edge flows */
  .ef { stroke-dasharray:6 5; animation: eflw 1.4s linear infinite; }
  @keyframes eflw { to { stroke-dashoffset:-36; } }

  /* Check icons on mastered nodes */
  .chk-sk { animation: chksk 14s ease-in-out infinite; }
  @keyframes chksk { 0%,18%{opacity:0} 24%,96%{opacity:1} 100%{opacity:0} }

  @media (prefers-reduced-motion: reduce) { * { animation:none !important; } }
</style>

<defs>
  <radialGradient id="bgCC" cx="42%" cy="35%" r="72%">
    <stop offset="0%"   stop-color="#041418"/>
    <stop offset="100%" stop-color="#0a0f1e"/>
  </radialGradient>
  <pattern id="gridCC" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M40 0L0 0 0 40" fill="none" stroke="rgba(255,255,255,.034)" stroke-width="1"/>
  </pattern>
  <filter id="glsCC" x="-60%" y="-60%" width="220%" height="220%">
    <feGaussianBlur stdDeviation="5" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="glowCC" x="-80%" y="-80%" width="260%" height="260%">
    <feGaussianBlur stdDeviation="10" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <symbol id="chkCC" viewBox="0 0 24 24">
    <path d="M5 12L9.5 17L19 7" fill="none" stroke="currentColor" stroke-width="2.8"
          stroke-linecap="round" stroke-linejoin="round"/>
  </symbol>
  <clipPath id="week-clip">
    <rect x="384" y="423" width="390" height="10" rx="5"/>
  </clipPath>
</defs>

<rect width="800" height="500" fill="url(#bgCC)"/>
<rect width="800" height="500" fill="url(#gridCC)"/>

<!-- LEFT PANEL -->
<text class="f" x="44" y="66" font-size="10.5" font-weight="700" letter-spacing="0.15em"
      fill="rgba(255,255,255,.38)">CODECAMP ADVANTAGE · 15 WEEKS</text>

<text class="f" x="44" y="108" font-size="34" font-weight="800" letter-spacing="-0.03em" fill="#e8e4d8">From zero</text>
<text class="f" x="44" y="148" font-size="34" font-weight="800" letter-spacing="-0.03em" font-style="italic" fill="#2dd4bf">to full-stack.</text>
<text class="f" x="44" y="184" font-size="28" font-weight="800" letter-spacing="-0.02em" fill="rgba(255,255,255,.6)">One skill at a time.</text>
