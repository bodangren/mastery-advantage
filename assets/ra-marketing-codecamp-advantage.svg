<text class="f" x="44" y="232" font-size="14" fill="rgba(255,255,255,.54)">A 15-week full-stack engineering</text>
<text class="f" x="44" y="252" font-size="14" fill="rgba(255,255,255,.54)">bootcamp where nothing is skipped.</text>
<text class="f" x="44" y="272" font-size="14" fill="rgba(255,255,255,.54)">AI tutors for daily guidance. Human</text>
