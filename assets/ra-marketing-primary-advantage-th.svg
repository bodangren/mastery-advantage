<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500"
     role="img" aria-label="Primary Advantage: เด็กทุกคนพบระดับของตัวเอง ทุกเซสชันทำให้พวกเขาก้าวหน้า">
<title>เด็กทุกคนพบระดับของตัวเอง · Primary Advantage</title>
<style>
  .f { font-family: ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif; }

  /* 10s loop */
  /* A 0-22%: avatar at node 3 (reading) */
  /* B 22-44%: comprehension check fires, node 3 completes */
  /* C 44-66%: avatar advances to node 4, AI tip appears */
  /* D 66-85%: bilingual scaffold tooltip shows */
  /* E 85-100%: hold + reset */

  /* Page-turn on book icon */
  .page-turn { animation: page-turn 2s ease-in-out infinite; transform-origin:center; transform-box:fill-box; }
  @keyframes page-turn { 0%,100%{transform:scaleX(1)} 50%{transform:scaleX(0.7)} }
  .page-turn-vis { animation: ptvis 10s ease-in-out infinite; }
  @keyframes ptvis { 0%,8%{opacity:0} 16%,42%{opacity:1} 50%,100%{opacity:0} }

  /* Node 3 complete */
  .n3-reading { animation: n3r 10s ease-in-out infinite; }
  @keyframes n3r {
    0%,20%  { fill:#ffffff; }
    30%,100%{ fill:#22d3ee; }
  }
  .n3-ring { animation: n3ring 10s ease-in-out infinite; }
  @keyframes n3ring {
    0%,20%  { stroke:#bae6fd; stroke-width:3; }
    30%,100%{ stroke:#67e8f9; stroke-width:2; }
  }
  /* Check icon fade in on node 3 */
  .n3-check { animation: n3chk 10s ease-in-out infinite; }
  @keyframes n3chk { 0%,22%{opacity:0} 32%,100%{opacity:1} }

  /* Avatar moves from node3 to node4 */
  .avatar { animation: avatar-move 10s ease-in-out infinite; }
  @keyframes avatar-move {
    0%,20%  { transform:translate(490px,270px); }
    38%     { transform:translate(490px,270px); }
    48%,100%{ transform:translate(590px,250px); }
  }

  /* Node 4 transitions locked → current */
  .n4-fill { animation: n4fill 10s ease-in-out infinite; }
  @keyframes n4fill {
    0%,40%  { fill:#2a3552; }
    52%,100%{ fill:#ffffff; }
  }
  .n4-ring-anim { animation: n4ring 10s ease-in-out infinite; }
  @keyframes n4ring {
    0%,40%  { stroke:#3a4870; stroke-width:1.5; }
    52%,100%{ stroke:#67e8f9; stroke-width:3; }
  }
  .n4-pulse { animation: n4pulse 1.8s ease-in-out infinite, n4pvis 10s ease-in-out infinite; transform-origin:center; transform-box:fill-box; }
  @keyframes n4pulse  { 0%,100%{transform:scale(1);opacity:0.5} 50%{transform:scale(1.1);opacity:0.9} }
  @keyframes n4pvis   { 0%,48%{opacity:0} 56%,88%{opacity:1} 95%,100%{opacity:0} }

  /* AI coaching tip */
  .ai-tip { animation: ai-tip 10s ease-in-out infinite; transform-origin:center; transform-box:fill-box; }
  @keyframes ai-tip {
    0%,44%  { opacity:0; transform:translateY(6px); }
    54%,72% { opacity:1; transform:translateY(0); }
    80%,100%{ opacity:0; transform:translateY(-4px); }
  }

  /* Bilingual scaffold tooltip */
  .bi-tip { animation: bi-tip 10s ease-in-out infinite; }
  @keyframes bi-tip {
    0%,64%  { opacity:0; }
    72%,84% { opacity:1; }
    92%,100%{ opacity:0; }
  }

  /* Check flash */
  .chk-flash { animation: chk-flash 10s ease-in-out infinite; transform-origin:center; transform-box:fill-box; }
  @keyframes chk-flash {
    0%,20%  { opacity:0; transform:scale(0); }
    26%     { opacity:1; transform:scale(1.4); }
    32%,42% { opacity:1; transform:scale(1); }
    50%,100%{ opacity:0; transform:scale(0); }
  }

  /* Path segment glow (active → completed) */
  .path-active { animation: path-active 10s ease-in-out infinite; stroke-dasharray:6 5; animation: path-anim 1.4s linear infinite, path-vis 10s ease-in-out infinite; }
  @keyframes path-anim { to { stroke-dashoffset:-36; } }
  @keyframes path-vis  { 0%,8%{opacity:0} 16%,42%{opacity:1} 48%,100%{opacity:0.25} }

  .path-next { stroke-dasharray:6 5; animation: pnext-anim 1.4s linear infinite, pnext-vis 10s ease-in-out infinite; }
  @keyframes pnext-anim { to { stroke-dashoffset:-36; } }
  @keyframes pnext-vis  { 0%,46%{opacity:0} 54%,88%{opacity:1} 95%,100%{opacity:0} }

  /* Progress pips */
  .pip { animation: pip 10s ease-in-out infinite; }
  @keyframes pip { 0%,8%{fill:#1e3048} 16%,88%{fill:#22d3ee} 95%,100%{fill:#1e3048} }
  .pip-d2 { animation-delay:.15s }
  .pip-d3 { animation-delay:.3s }

  @media (prefers-reduced-motion: reduce) { * { animation:none !important; } }
</style>

<defs>
  <radialGradient id="bgPA" cx="42%" cy="35%" r="72%">
    <stop offset="0%"   stop-color="#131c30"/>
    <stop offset="100%" stop-color="#0a0f1e"/>
  </radialGradient>
  <pattern id="gridPA" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M40 0L0 0 0 40" fill="none" stroke="rgba(255,255,255,.034)" stroke-width="1"/>
  </pattern>
  <filter id="glsPA" x="-60%" y="-60%" width="220%" height="220%">
    <feGaussianBlur stdDeviation="5" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="glowPA" x="-80%" y="-80%" width="260%" height="260%">
    <feGaussianBlur stdDeviation="10" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <symbol id="chkPA" viewBox="0 0 24 24">
    <path d="M5 12L9.5 17L19 7" fill="none" stroke="currentColor" stroke-width="2.8"
          stroke-linecap="round" stroke-linejoin="round"/>
  </symbol>
  <symbol id="bookPA" viewBox="0 0 24 24">
    <rect x="3" y="3" width="18" height="18" rx="2" fill="none" stroke="currentColor" stroke-width="1.8"/>
    <line x1="12" y1="3" x2="12" y2="21" stroke="currentColor" stroke-width="1.4"/>
    <line x1="7" y1="8" x2="10" y2="8" stroke="currentColor" stroke-width="1.2"/>
    <line x1="7" y1="12" x2="10" y2="12" stroke="currentColor" stroke-width="1.2"/>
    <line x1="14" y1="8" x2="17" y2="8" stroke="currentColor" stroke-width="1.2"/>
  </symbol>
  <symbol id="starPA" viewBox="0 0 24 24">
    <path d="M12 2L14.4 9.3H22L16 14L18.4 21.3L12 17L5.6 21.3L8 14L2 9.3H9.6Z" fill="currentColor"/>
  </symbol>
</defs>

<rect width="800" height="500" fill="url(#bgPA)"/>
<rect width="800" height="500" fill="url(#gridPA)"/>

<!-- LEFT PANEL -->
<text class="f" x="44" y="66" font-size="10.5" font-weight="700" letter-spacing="0.15em"
      fill="rgba(255,255,255,.38)">PRIMARY ADVANTAGE · ป.3–ป.6</text>

<text class="f" x="44" y="114" font-size="38" font-weight="800" letter-spacing="-0.03em" fill="#e8e4d8">เด็กทุกคน</text>
<text class="f" x="44" y="159" font-size="38" font-weight="800" letter-spacing="-0.03em" font-style="italic" fill="#22d3ee">พบระดับของตัวเอง.</text>
<rect x="44" y="174" width="222" height="3" rx="1.5" fill="#22d3ee" opacity=".65"/>

<text class="f" x="44" y="212" font-size="14" fill="rgba(255,255,255,.54)">ข้อความระดับที่ตรงกับความพร้อม</text>
<text class="f" x="44" y="232" font-size="14" fill="rgba(255,255,255,.54)">ของนักเรียนแต่ละคนพอดี ติวเตอร์ AI กระตุ้น</text>
<text class="f" x="44" y="252" font-size="14" fill="rgba(255,255,255,.54)">ในจังหวะที่เหมาะสม โครงสร้างภาษาไทยและจีน</text>
<text class="f" x="44" y="272" font-size="14" fill="rgba(255,255,255,.54)">สำหรับสนับสนุนภาษาแม่</text>
<text class="f" x="44" y="292" font-size="14" fill="rgba(255,255,255,.54)">ทุกเซสชันทำให้พวกเขาก้าวหน้า</text>

<!-- Legend -->
<g transform="translate(44,320)">
  <circle cx="7" cy="7"  r="6" fill="#22d3ee"/>
  <text class="f" x="20" y="12" font-size="13" fill="rgba(255,255,255,.65)">ชำนาญระดับนี้แล้ว</text>
  <circle cx="7" cy="31" r="6" fill="#ffffff"/>
  <text class="f" x="20" y="36" font-size="13" fill="rgba(255,255,255,.65)">กำลังอ่าน</text>
  <circle cx="7" cy="55" r="6" fill="#f5b942"/>
  <text class="f" x="20" y="60" font-size="13" fill="rgba(255,255,255,.65)">ถัดไป</text>
  <circle cx="7" cy="79" r="6" fill="#2a3552" stroke="#3a4870" stroke-width="1.5"/>
  <text class="f" x="20" y="84" font-size="13" fill="rgba(255,255,255,.65)">เร็วๆ นี้</text>
</g>

<text class="f" x="44" y="454" font-size="11.5" font-weight="600" letter-spacing="0.04em"
      fill="rgba(255,255,255,.22)">ขับเคลื่อนโดย Mastery Advantage™ · ระดับ PA 1–14</text>

<!-- Divider -->
<line x1="356" y1="28" x2="356" y2="472" stroke="rgba(255,255,255,.05)" stroke-width="1"/>

<!-- RIGHT PANEL — Story path -->
<text class="f" x="581" y="56" text-anchor="middle" font-size="10.5" font-weight="700" letter-spacing="0.13em"
      fill="rgba(255,255,255,.35)">เส้นทางการอ่านของคุณ</text>

<!-- Curved path backbone -->
<path d="M390 270 Q430 260 490 270 Q540 280 590 250 Q640 225 690 240 Q730 252 758 248"
      fill="none" stroke="rgba(255,255,255,.08)" stroke-width="3" stroke-linecap="round"/>

<!-- Active path segment (node 2→3) -->
<path class="path-active"
      d="M440 268 Q468 272 490 270"
      fill="none" stroke="#22d3ee" stroke-width="2.5" stroke-linecap="round"/>

<!-- Next path segment (node 3→4) -->
<path class="path-next"
      d="M510 268 Q548 262 588 252"
      fill="none" stroke="#22d3ee" stroke-width="2.5" stroke-linecap="round"/>

<!-- Node 1 — Mastered (PA 3) -->
<g transform="translate(390,270)">
  <circle r="22" fill="#22d3ee" filter="url(#glsPA)"/>
  <circle r="22" fill="#22d3ee"/>
  <circle r="28" fill="none" stroke="#67e8f9" stroke-width="1.5"/>
  <use href="#chkPA" x="-10" y="-10" width="20" height="20" fill="#0c4a6e"/>
  <text class="f" x="0" y="44" text-anchor="middle" font-size="9" fill="rgba(255,255,255,.45)">PA 3</text>
</g>

<!-- Node 2 — Mastered (PA 4) -->
<g transform="translate(442,268)">
  <circle r="18" fill="#22d3ee"/>
  <circle r="23" fill="none" stroke="#67e8f9" stroke-width="1.5"/>
  <use href="#chkPA" x="-8" y="-8" width="16" height="16" fill="#0c4a6e"/>
  <text class="f" x="0" y="36" text-anchor="middle" font-size="9" fill="rgba(255,255,255,.45)">PA 4</text>
</g>

<!-- Node 3 — Current reading (PA 5) → transitions to mastered -->
<circle cx="490" cy="270" r="28" fill="#22d3ee" opacity="0.15" filter="url(#glowPA)"/>
<circle cx="490" cy="270" r="22" class="n3-reading"/>
<circle cx="490" cy="270" r="28" fill="none" class="n3-ring"/>
<!-- Book icon (reading state) -->
<g class="page-turn-vis">
  <use href="#bookPA" class="page-turn" x="479" y="259" width="22" height="22" fill="#0a1a2a"/>
</g>
<!-- Check (mastered state) -->
<g class="n3-check">
  <use href="#chkPA" x="480" y="260" width="20" height="20" fill="#0a2040"/>
</g>
<text class="f" x="490" y="308" text-anchor="middle" font-size="9" fill="rgba(255,255,255,.45)">PA 5</text>

<!-- Check flash badge -->
<g class="chk-flash" transform="translate(490,270)">
  <circle r="18" fill="#22d3ee"/>
  <use href="#chkPA" x="-9" y="-9" width="18" height="18" fill="#0a2040"/>
</g>

<!-- Node 4 — Next (PA 6) -->
<circle cx="590" cy="250" r="24" fill="#22d3ee" opacity="0.12" filter="url(#glowPA)"/>
<circle cx="590" cy="250" r="18" class="n4-fill"/>
<circle cx="590" cy="250" r="24" fill="none" class="n4-ring-anim"/>
<circle cx="590" cy="250" r="30" fill="none" stroke="#67e8f9" stroke-width="2" class="n4-pulse"/>
<use href="#bookPA" x="579" y="239" width="22" height="22" fill="#0a1a2a"/>
<text class="f" x="590" y="285" text-anchor="middle" font-size="9" fill="rgba(255,255,255,.45)">PA 6</text>

<!-- Node 5 — Ready (PA 7) -->
<g transform="translate(690,240)">
  <circle r="16" fill="#f5b942"/>
  <circle r="21" fill="none" stroke="#ffd27a" stroke-width="1.5"/>
  <use href="#starPA" x="-8" y="-8" width="16" height="16" fill="#1a1208"/>
  <text class="f" x="0" y="32" text-anchor="middle" font-size="9" fill="rgba(255,255,255,.45)">PA 7</text>
</g>

<!-- Node 6 — Locked (PA 8) -->
<g transform="translate(758,248)">
  <circle r="14" fill="#2a3552"/>
  <circle r="18" fill="none" stroke="#3a4870" stroke-width="1.5"/>
  <rect x="-4.5" y="-1" width="9" height="7.5" rx="1.5" fill="rgba(255,255,255,.32)"/>
  <path d="M-2.6 -1 V-3.6 a2.6 2.6 0 0 1 5.2 0 V-1" fill="none" stroke="rgba(255,255,255,.32)" stroke-width="1.3"/>
  <text class="f" x="0" y="30" text-anchor="middle" font-size="9" fill="rgba(255,255,255,.25)">PA 8</text>
</g>

<!-- AI coaching tip -->
<g class="ai-tip" transform="translate(590,195)">
  <rect x="-100" y="-22" width="200" height="36" rx="8"
        fill="#0e1f38" stroke="#22d3ee" stroke-width="1.2"/>
  <polygon points="-8,14 8,14 0,22" fill="#22d3ee"/>
  <text class="f" x="0" y="-6" text-anchor="middle" font-size="10" font-weight="700" letter-spacing="0.08em" fill="#22d3ee">ติวเตอร์ AI</text>
  <text class="f" x="0" y="9" text-anchor="middle" font-size="10" fill="rgba(255,255,255,.7)">อ่านประโยคสุดท้ายอีกครั้ง</text>
</g>

<!-- Bilingual scaffold tooltip -->
<g class="bi-tip" transform="translate(590,310)">
  <rect x="-90" y="0" width="180" height="34" rx="8"
        fill="#1a0a2e" stroke="#c084fc" stroke-width="1"/>
  <text class="f" x="0" y="13" text-anchor="middle" font-size="9.5" fill="rgba(255,255,255,.45)">unfamiliar word?</text>
  <text class="f" x="0" y="27" text-anchor="middle" font-size="11" font-weight="700" fill="#c084fc">นิทาน = story 故事</text>
</g>

<!-- Level progress strip -->
<g transform="translate(376,420)">
  <text class="f" x="0" y="-6" font-size="9.5" font-weight="700" letter-spacing="0.08em"
        fill="rgba(255,255,255,.28)">ความก้าวหน้าเซสชัน</text>
  <rect x="0" y="0" width="400" height="6" rx="3" fill="rgba(255,255,255,.06)"/>
  <!-- pip dots for completed activities -->
  <circle class="pip"    cx="18"  cy="3" r="4"/>
  <circle class="pip pip-d2" cx="38"  cy="3" r="4"/>
  <circle class="pip pip-d3" cx="58"  cy="3" r="4"/>
  <circle cx="78"  cy="3" r="4" fill="#1e3048"/>
  <circle cx="98"  cy="3" r="4" fill="#1e3048"/>
</g>

<text class="f" x="576" y="458" text-anchor="middle" font-size="11" fill="rgba(255,255,255,.24)" letter-spacing="0.03em">
  เรื่องที่ AI จับคู่ · ตรวจความคล่อง · สนับสนุนสองภาษา
</text>
</svg>
