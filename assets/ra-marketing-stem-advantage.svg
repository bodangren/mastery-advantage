<!-- Caption strip -->
<g transform="translate(376,432)">
  <rect x="0" y="0" width="400" height="32" rx="7" fill="rgba(255,255,255,.04)"/>
  <text class="f cap1" x="200" y="21" text-anchor="middle" font-size="12.5" font-weight="700" fill="#c7d2fe">Every project maps to exact prerequisite skills</text>
